<svg width="192" height="192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background avec coins arrondis -->
  <rect width="192" height="192" fill="#8B4513" rx="32"/>

  <!-- Château dessiné vectoriel -->
  <g transform="translate(96,96)">
    <!-- Tour principale centrale -->
    <rect x="-20" y="-45" width="40" height="60" fill="#E8E2D6"/>
    <!-- Tours latérales -->
    <rect x="-45" y="-35" width="25" height="50" fill="#E8E2D6"/>
    <rect x="20" y="-35" width="25" height="50" fill="#E8E2D6"/>

    <!-- Créneaux tour centrale -->
    <rect x="-20" y="-50" width="8" height="8" fill="#E8E2D6"/>
    <rect x="-4" y="-50" width="8" height="8" fill="#E8E2D6"/>
    <rect x="12" y="-50" width="8" height="8" fill="#E8E2D6"/>

    <!-- Créneaux tours latérales -->
    <rect x="-45" y="-40" width="6" height="6" fill="#E8E2D6"/>
    <rect x="-32" y="-40" width="6" height="6" fill="#E8E2D6"/>
    <rect x="20" y="-40" width="6" height="6" fill="#E8E2D6"/>
    <rect x="33" y="-40" width="6" height="6" fill="#E8E2D6"/>

    <!-- Porte d'entrée -->
    <path d="M -8,-15 L -8,15 L 8,15 L 8,-15 Q 8,-25 0,-25 Q -8,-25 -8,-15" fill="#8B4513"/>

    <!-- Fenêtres -->
    <rect x="-35" y="-25" width="6" height="8" fill="#8B4513"/>
    <rect x="29" y="-25" width="6" height="8" fill="#8B4513"/>
    <rect x="-6" y="-30" width="4" height="6" fill="#8B4513"/>
    <rect x="2" y="-30" width="4" height="6" fill="#8B4513"/>

    <!-- Drapeaux sur les tours -->
    <polygon points="-37,-40 -37,-50 -28,-45" fill="#D4AF37"/>
    <polygon points="28,-40 28,-50 37,-45" fill="#D4AF37"/>
  </g>
</svg>
